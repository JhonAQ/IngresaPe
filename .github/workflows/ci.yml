name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  quality:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Sync TypeScript project references
        run: npx nx sync

      - name: Check formatting
        run: npx nx format:check --base=remotes/origin/main

      - name: Lint
        run: npx nx run-many -t lint --all

      - name: Type check
        run: npx nx run-many -t typecheck --all

      - name: Test
        run: npx nx run-many -t test --all

      - name: Build
        run: npx nx run-many -t build --all
